name: Opinet Oil Price Monitor
packageKey: opinet-oil-price-monitor-v1
version: 1.0
compatibility: ">=0.32.0"
description: "오피넷 API를 통한 실시간 유가 정보 모니터링 (AEB 연동)"
manufacturerName: "Custom"
platforms:
  - name: SmartThings

permissions:
  lan: {}
  discovery: {}

preferences:
  - name: aebAutoSearch
    title: "AEB 자동 검색(mDNS)"
    description: "mDNS를 사용하여 Android Edge Bridge를 자동으로 찾습니다."
    required: true
    preferenceType: boolean
    definition:
      type: boolean
      default: true

  - name: aebIp
    title: "AEB 주소(자동 검색 끔 선택시)"
    description: "자동 검색 비활성화 시 사용됩니다. (예: 192.168.0.100)"
    required: false
    preferenceType: string
    definition:
      type: string
      default: ""
      minLength: 0
      maxLength: 30

  - name: aebPort
    title: "AEB 포트번호"
    description: "자동 검색 비활성화 시 사용됩니다. (기본값: 8088)"
    required: false
    preferenceType: integer
    definition:
      type: integer
      default: 8088
      minimum: 1
      maximum: 65535

  - name: opinetApiKey
    title: "오피넷 API Key"
    description: "오피넷에서 발급받은 API Key"
    required: true
    preferenceType: string
    definition:
      type: string
      default: ""
      minLength: 0
      maxLength: 20

  - name: sidoCode
    title: "시도코드 (2자리)"
    description: "전국 평균 및 지역 평균 조회용 시도코드 (예: 서울=01, 경기=02)"
    required: true
    preferenceType: string
    definition:
      type: string
      default: "01"
      minLength: 2
      maxLength: 2

  - name: sigunguCode
    title: "시군구코드 (4자리)"
    description: "시군구 평균 및 최저가 주유소 조회용 코드 (예: 종로구=0101, 강남구=0103)"
    required: false
    preferenceType: string
    definition:
      type: string
      default: ""
      minLength: 0
      maxLength: 4

  - name: oilType
    title: "유종 선택"
    description: "조회할 유종을 설정합니다."
    required: true
    preferenceType: enumeration
    definition:
      default: "B027"
      options:
        B027: "보통휘발유"
        B034: "고급휘발유"
        D047: "자동차경유"
        C004: "실내등유"
        K015: "자동차부탄"

  - name: favGasStation1
    title: "단골 주유소 1 코드"
    description: "가격을 조회할 단골 주유소 1 ID (예: A0002517)"
    required: false
    preferenceType: string
    definition:
      type: string
      default: ""
      minLength: 0
      maxLength: 10

  - name: favGasStation2
    title: "단골 주유소 2 코드"
    description: "가격을 조회할 단골 주유소 2 ID (예: A0002517)"
    required: false
    preferenceType: string
    definition:
      type: string
      default: ""
      minLength: 0
      maxLength: 10

  - name: refreshInterval
    title: "새로고침 주기 (분)"
    description: "유가 정보 자동 갱신 주기 (1 ~ 60분)"
    required: true
    preferenceType: integer
    definition:
      type: integer
      default: 60
      minimum: 1
      maximum: 60
